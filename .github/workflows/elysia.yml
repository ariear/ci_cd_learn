name: elysia basic test

on: 
  pull_request:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup bun
        uses: oven-sh/setup-bun@v2
      - name: install depedency
        run: bun install

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: lint & quality code
        run: bun lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: testing
        run: bun test
